name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release --quiet

  linux-interop:
    name: Linux interop (C ↔ rsync-rs, rsh + daemon)
    needs: test
    runs-on: ubuntu-latest
    # Some interop scenarios are known-failing pending a daemon-client port
    # and rs↔C-3.2.7 flist audit (see AUDIT.md §4.1).  Don't block release
    # on this job until those land; status stays visible in PR checks.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-interop
      - name: Install C rsync + ssh client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client python3
          rsync --version | head -n 2
      - name: Build release
        run: cargo build --release --locked
      - name: Install rsh-style wrapper
        run: |
          # Universal wrapper: drops the host arg, exec's whatever
          # rsync-path the client requested.  This makes the same wrapper
          # serve both C-as-server and rsync-rs-as-server scenarios so
          # interop is exercised in both directions.
          sudo tee /usr/local/bin/wrapper >/dev/null <<'EOF'
          #!/bin/sh
          shift 1
          exec "$@"
          EOF
          sudo chmod +x /usr/local/bin/wrapper
      - name: Run regression suite (rsh + daemon, both directions)
        env:
          RSYNC_C: rsync
          RSYNC_RS: ${{ github.workspace }}/target/release/rsync-rs
          RSYNC_WRAPPER: /usr/local/bin/wrapper
        run: |
          export PATH="$PWD/target/release:$PATH"
          python3 -m tests.regress --verbose --timeout 15

  windows-smoke:
    name: Windows smoke (${{ matrix.flavor }})
    needs: test
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [native, interop]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-smoke-${{ matrix.flavor }}
      - name: Build release
        run: cargo build --release --locked
      - name: Native --local smoke
        if: matrix.flavor == 'native'
        run: python tests\win_smoke.py
      - name: Install C rsync via Chocolatey
        if: matrix.flavor == 'interop'
        shell: pwsh
        run: |
          choco install rsync --no-progress -y --version=6.2.7
          rsync --version
      - name: Linux↔Windows interop smoke (C rsync ↔ rsync-rs)
        if: matrix.flavor == 'interop'
        shell: bash
        env:
          RSYNC_RS: ${{ github.workspace }}\target\release\rsync-rs.exe
        run: python tests/win_interop.py

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          set -eu
          name="rsync-rs-${{ matrix.target }}"
          mkdir -p "dist/$name"
          bin="target/${{ matrix.target }}/release/rsync-rs${{ matrix.ext }}"
          cp "$bin" "dist/$name/"
          cp README.md "dist/$name/" 2>/dev/null || true
          cp LICENSE* "dist/$name/" 2>/dev/null || true
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "$name.zip" "$name" >/dev/null
          else
            tar -czf "$name.tar.gz" "$name"
          fi
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: rsync-rs-${{ matrix.target }}
          path: dist/rsync-rs-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build, windows-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
